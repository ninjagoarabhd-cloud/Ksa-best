<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <meta name="monetag" content="727061bd455dea596d740f9170a793c9">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSA Best | أفلام ومسلسلات</title>

<!-- Tailwind CSS عبر CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- خط عربي أنيق -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

<!-- ===================== الشريط العلوي (Header) ===================== -->
<header id="main-header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 px-4 md:px-10 py-4 flex items-center justify-between">
    <!-- الشعار -->
    <div class="flex items-center gap-1 shrink-0">
        <h1 class="text-2xl md:text-3xl font-black tracking-wide">
            <span class="text-white">KSA</span><span class="text-red-600"> Best</span>
        </h1>
    </div>

    <!-- خانة البحث -->
    <div class="relative w-1/2 md:w-1/3">
        <input
            id="search-input"
            type="text"
            placeholder="ابحث عن فيلم أو مسلسل..."
            class="w-full bg-black/70 border border-gray-600 focus:border-red-600 text-white text-sm md:text-base rounded-full py-2 px-5 pr-10 outline-none transition-colors duration-200"
        >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        <!-- نتائج البحث المنسدلة -->
        <div id="search-results" class="hidden absolute mt-2 w-full bg-[#141414] border border-gray-700 rounded-lg max-h-96 overflow-y-auto shadow-2xl z-50"></div>
    </div>
</header>

<!-- ===================== المحتوى الرئيسي ===================== -->
<main class="pt-24 pb-16 px-4 md:px-10">

    <!-- قسم: الأكثر رواجاً اليوم -->
    <section class="mb-12">
        <h2 class="text-xl md:text-2xl font-bold mb-4 border-r-4 border-red-600 pr-3">الأكثر رواجاً اليوم</h2>
        <div id="trending-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5"></div>
    </section>

    <!-- قسم: أحدث الأفلام -->
    <section class="mb-12">
        <h2 class="text-xl md:text-2xl font-bold mb-4 border-r-4 border-red-600 pr-3">أحدث الأفلام</h2>
        <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5"></div>
    </section>

    <!-- قسم: أحدث المسلسلات -->
    <section class="mb-12">
        <h2 class="text-xl md:text-2xl font-bold mb-4 border-r-4 border-red-600 pr-3">أحدث المسلسلات</h2>
        <div id="series-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5"></div>
    </section>

    <!-- مؤشر التحميل -->
    <div id="loading-indicator" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center">
        <div class="w-14 h-14 border-4 border-gray-700 border-t-red-600 rounded-full animate-spin"></div>
    </div>

</main>

<!-- ===================== التذييل ===================== -->
<footer class="px-4 md:px-10 py-8 border-t border-gray-800 text-gray-500 text-sm text-center">
    <p>© 2026 KSA Best — جميع الحقوق محفوظة. هذا الموقع يعرض معلومات وتريلرات رسمية فقط عبر بيانات TMDB.</p>
</footer>

<!-- ===================== النافذة المنبثقة (Modal) ===================== -->
<div id="modal-overlay" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-start md:items-center justify-center overflow-y-auto py-6 px-2">
    <div id="modal-box" class="bg-[#141414] w-full max-w-4xl rounded-xl overflow-hidden relative shadow-2xl">

        <!-- زر الإغلاق -->
        <button id="modal-close-btn" class="absolute top-3 left-3 z-20 bg-black/60 hover:bg-red-600 transition-colors duration-200 rounded-full w-9 h-9 flex items-center justify-center text-white text-xl">
            &times;
        </button>

        <!-- منطقة المشغل (Iframe Player) -->
        <div class="relative w-full aspect-video bg-black">
            <iframe
                id="video-player"
                class="w-full h-full"
                src=""
                title="مشغل الفيديو"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <!-- تفاصيل المحتوى -->
        <div class="p-5 md:p-7">
            <h2 id="modal-title" class="text-2xl md:text-3xl font-extrabold mb-2"></h2>

            <div class="flex flex-wrap items-center gap-3 text-sm text-gray-400 mb-4">
                <span id="modal-rating" class="flex items-center gap-1 text-yellow-400 font-bold"></span>
                <span id="modal-date"></span>
                <span id="modal-type" class="bg-red-600/90 text-white text-xs font-bold px-2 py-1 rounded"></span>
            </div>

            <!-- خانات اختيار الموسم والحلقة (تظهر فقط للمسلسلات) -->
            <div id="series-controls" class="hidden flex flex-wrap items-center gap-3 mb-5">
                <div class="flex items-center gap-2">
                    <label for="season-select" class="text-sm text-gray-300">الموسم:</label>
                    <select id="season-select" class="bg-[#222] border border-gray-600 text-white text-sm rounded-md px-3 py-1.5 outline-none focus:border-red-600"></select>
                </div>
                <div class="flex items-center gap-2">
                    <label for="episode-select" class="text-sm text-gray-300">الحلقة:</label>
                    <select id="episode-select" class="bg-[#222] border border-gray-600 text-white text-sm rounded-md px-3 py-1.5 outline-none focus:border-red-600"></select>
                </div>
                <button id="play-episode-btn" class="bg-red-600 hover:bg-red-700 transition-colors duration-200 text-white text-sm font-bold px-5 py-1.5 rounded-md">
                    ▶ تشغيل التريلر
                </button>
            </div>

            <p id="modal-overview" class="text-gray-300 leading-relaxed text-sm md:text-base"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
